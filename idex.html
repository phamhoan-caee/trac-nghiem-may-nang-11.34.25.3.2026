<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SÁT HẠCH XE NÂNG - CAEE</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <style>
        :root {
            --caee-blue: #003399; --header-blue: #0040cc;
            --btn-orange: #ff6600; --btn-blue: #3366ff;
            --text-dark: #333;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background-color: var(--caee-blue); font-family: sans-serif; padding-top: 60px; }
        
        .caee-header { background: var(--header-blue); color: white; padding: 12px 20px; display: flex; justify-content: space-between; align-items: center; position: fixed; top: 0; width: 100%; z-index: 1000; }
        .timer-box { background: #ff3333; padding: 5px 15px; border-radius: 4px; font-weight: bold; }

        #start-screen { min-height: 90vh; display: flex; justify-content: center; align-items: center; }
        .login-box { background: white; padding: 30px; border-radius: 12px; width: 95%; max-width: 450px; text-align: center; box-shadow: 0 10px 25px rgba(0,0,0,0.5); }
        .school-info { font-weight: bold; margin-bottom: 20px; border-bottom: 2px solid #eee; padding-bottom: 10px; font-size: 1.1rem; }
        
        .mode-selector { display: flex; align-items: center; justify-content: center; margin-bottom: 20px; gap: 10px; }
        .switch { position: relative; width: 50px; height: 24px; display: inline-block; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #ccc; transition: .4s; border-radius: 24px; }
        .slider:before { position: absolute; content: ""; height: 18px; width: 18px; left: 3px; bottom: 3px; background-color: white; transition: .4s; border-radius: 50%; }
        input:checked + .slider { background-color: #28a745; }
        input:checked + .slider:before { transform: translateX(26px); }

        #quiz-screen { max-width: 1200px; margin: 20px auto; display: grid; grid-template-columns: 1fr 300px; gap: 20px; padding: 0 15px; }
        .main-quiz { background: white; padding: 25px; border-radius: 8px; min-height: 400px; }
        .sidebar { background: white; padding: 20px; border-radius: 8px; height: fit-content; }
        
        .option-item { border: 2px solid #eee; padding: 15px; margin-bottom: 10px; border-radius: 8px; cursor: pointer; transition: 0.2s; font-weight: 500; }
        .option-item:hover { background: #f8f9fa; }
        
        /* Màu sắc trạng thái */
        .option-item.selected-exam { background: #e7f0ff; border-color: #3366ff; color: #003399; }
        .option-item.correct { background: #d4edda !important; border-color: #28a745 !important; color: #155724 !important; font-weight: bold; }
        .option-item.wrong { background: #f8d7da !important; border-color: #dc3545 !important; color: #721c24 !important; }

        .explanation-box { margin-top: 15px; padding: 15px; background: #eef2f7; border-left: 5px solid #007bff; border-radius: 4px; line-height: 1.5; }
        
        .nav-footer { display: flex; justify-content: space-between; margin-top: 25px; gap: 10px; }
        .btn-nav { background: var(--btn-blue); color: white; border: none; padding: 12px 20px; border-radius: 6px; font-weight: bold; cursor: pointer; flex: 1; }
        
        .q-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; margin-top: 15px; }
        .grid-item { height: 40px; border: 1px solid #ddd; display: flex; align-items: center; justify-content: center; border-radius: 4px; cursor: pointer; font-size: 14px; background: #fff; }
        .grid-item.answered { background: var(--caee-blue); color: white; }
        .grid-item.active { border: 2.5px solid var(--btn-orange); font-weight: bold; }
        
        .btn-submit { background: #ff3333; color: white; border: none; width: 100%; padding: 15px; margin-top: 20px; border-radius: 6px; font-weight: bold; cursor: pointer; }
        input[type="text"] { width: 100%; padding: 12px; margin-bottom: 15px; border: 1px solid #ddd; border-radius: 6px; font-size: 16px; }
        
        @media (max-width: 850px) { 
            #quiz-screen { grid-template-columns: 1fr; } 
            body { padding-top: 70px; }
        }
    </style>
</head>
<body>

    <div id="start-screen">
        <div class="login-box">
            <div class="school-info">
                <p>TRƯỜNG CAO ĐẲNG CƠ ĐIỆN NN & MT</p>
                <p style="color: #0056b3;">KHOA MÁY THI CÔNG</p>
            </div>
            <div class="mode-selector">
                <span>Chế độ:</span>
                <label class="switch"><input type="checkbox" id="modeToggle"><span class="slider"></span></label>
                <b id="modeText" style="color: #ff6600;">Thi sát hạch</b>
            </div>
            <input type="text" id="studentName" placeholder="Họ và Tên học viên">
            <input type="text" id="studentID" placeholder="Mã khóa (VD: 57)">
            <button class="btn-submit" onclick="startQuiz()" style="background: #28a745;">BẮT ĐẦU LÀM BÀI</button>
        </div>
    </div>

    <div class="caee-header" id="caee-header" style="display:none;">
        <div id="header-text" style="font-weight:bold; font-size: 0.9rem;">SÁT HẠCH VẬN HÀNH XE NÂNG</div>
        <div id="timer" class="timer-box">20:00</div>
    </div>

    <div id="quiz-screen" style="display:none;">
        <div class="main-quiz" id="quiz-container"></div>
        <div class="sidebar">
            <p style="text-align: center; font-weight: bold;">SƠ ĐỒ CÂU HỎI</p>
            <div class="q-grid" id="nav-grid"></div>
            <button class="btn-submit" onclick="submitQuiz()">NỘP BÀI</button>
        </div>
    </div>

    <script>
        const CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRCf-F3dCvJi6pr4elMqwG9YrNtmB-GWds7YCmf09JbTv8AY3gtrwXpcMXc8KTQmpuJhc0al2jSBR4B/pub?gid=1176419369&single=true&output=csv";
        
        let allQuestions = [], selectedQuestions = [], studentAnswers = [];
        let currentIndex = 0, timeLeft = 1200, timer, isFinished = false;

        Papa.parse(CSV_URL, {
            download: true, header: true,
            complete: function(results) {
                allQuestions = results.data.filter(r => r.CauHoi).map(r => ({
                    q: r.CauHoi.trim(),
                    options: [r.A, r.B, r.C, r.D].filter(o => o && o.trim() !== ""),
                    correct: r.DapAnDung ? r.DapAnDung.trim() : "",
                    exp: r.Giaithich || r.GiaiThich || "Chú ý thực hiện đúng quy trình an toàn kỹ thuật."
                }));
                console.log("Đã tải " + allQuestions.length + " câu hỏi.");
            }
        });

        document.getElementById('modeToggle').addEventListener('change', function() {
            const isPractice = this.checked;
            document.getElementById('modeText').innerText = isPractice ? "Ôn tập (Có giải thích)" : "Thi sát hạch";
            document.getElementById('modeText').style.color = isPractice ? "#28a745" : "#ff6600";
            localStorage.setItem('mode', isPractice ? 'practice' : 'exam');
        });

        function startQuiz() {
            const name = document.getElementById('studentName').value;
            if (!name || allQuestions.length === 0) return alert("Vui lòng nhập tên và đợi dữ liệu tải xong!");
            
            selectedQuestions = allQuestions.sort(() => 0.5 - Math.random()).slice(0, 30);
            document.getElementById('start-screen').style.display = 'none';
            document.getElementById('caee-header').style.display = 'flex';
            document.getElementById('quiz-screen').style.display = 'grid';
            
            showQuestion(0);
            timer = setInterval(() => {
                timeLeft--;
                let m = Math.floor(timeLeft/60), s = timeLeft%60;
                document.getElementById('timer').innerText = `${m}:${s<10?'0':''}${s}`;
                if(timeLeft <= 0) submitQuiz(true);
            }, 1000);
        }

        function showQuestion(idx) {
            if (idx < 0 || idx >= 30) return;
            currentIndex = idx;
            const q = selectedQuestions[idx];
            const saved = studentAnswers.find(a => a.id === idx);
            const isPractice = localStorage.getItem('mode') === 'practice';
            
            let html = `<p style="color:#666; margin-bottom:10px;">Câu ${idx+1}/30</p>
                        <h3 style="margin-bottom:20px; line-height:1.4;">${q.q}</h3>`;
            
            q.options.forEach(opt => {
                let stateClass = "";
                if (saved) {
                    const cleanOpt = opt.trim();
                    const cleanCorrect = q.correct.trim();
                    const cleanSavedAns = saved.ans.trim();

                    if (isPractice) {
                        if (cleanOpt === cleanCorrect) stateClass = "correct";
                        else if (cleanOpt === cleanSavedAns) stateClass = "wrong";
                    } else {
                        if (cleanOpt === cleanSavedAns) stateClass = "selected-exam";
                    }
                }
                html += `<div class="option-item ${stateClass}" onclick="handleSelect(this, '${opt.replace(/'/g, "\\'")}')">${opt}</div>`;
            });

            if (saved && isPractice) {
                html += `<div class="explanation-box"><b>Giải thích:</b><br>${q.exp}</div>`;
            }
            
            html += `<div class="nav-footer">
                <button class="btn-nav" onclick="showQuestion(${idx-1})" ${idx===0?'style="visibility:hidden"':''}>‹ TRƯỚC</button>
                <button class="btn-nav" onclick="${idx===29?'submitQuiz()':'showQuestion('+(idx+1)+')'}">${idx===29?'NỘP BÀI':'TIẾP ›'}</button>
            </div>`;
            
            document.getElementById('quiz-container').innerHTML = html;
            updateGrid();
            window.scrollTo(0,0);
        }

        function handleSelect(el, ansText) {
            if (isFinished) return;
            const idx = studentAnswers.findIndex(a => a.id === currentIndex);
            if (idx > -1) studentAnswers[idx].ans = ansText;
            else studentAnswers.push({ id: currentIndex, ans: ansText });

            if (localStorage.getItem('mode') === 'practice') {
                showQuestion(currentIndex);
            } else {
                document.querySelectorAll('.option-item').forEach(i => i.classList.remove('selected-exam'));
                el.classList.add('selected-exam');
                updateGrid();
            }
        }

        function updateGrid() {
            const grid = document.getElementById('nav-grid');
            grid.innerHTML = "";
            selectedQuestions.forEach((_, i) => {
                const isAns = studentAnswers.some(a => a.id === i);
                const active = i === currentIndex ? 'active' : '';
                const filled = isAns ? 'answered' : '';
                grid.innerHTML += `<div class="grid-item ${active} ${filled}" onclick="showQuestion(${i})">${i+1}</div>`;
            });
        }

        function submitQuiz(auto = false) {
            if (isFinished || (!auto && !confirm("Xác nhận nộp bài?"))) return;
            isFinished = true; 
            clearInterval(timer);
            
            let score = 0;
            studentAnswers.forEach(a => {
                if(a.ans.trim() === selectedQuestions[a.id].correct.trim()) score++;
            });
            
            alert(`Kết quả: ${score}/30 - ${score >= 25 ? 'ĐẠT' : 'KHÔNG ĐẠT'}`);
            location.reload();
        }
    </script>
</body>
</html>
